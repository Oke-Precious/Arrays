<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Structure</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body onload="showAll()">
    <main class="page">
        <section class="app-shell" aria-labelledby="pageTitle">
            <div class="title-block">
                <span class="eyebrow">JavaScript Practice</span>
                <h1 id="pageTitle">Student Array Lab</h1>
                <p>Add each name and watch your class list come alive.</p>
            </div>

            <div class="entry-panel">
                <div id="errorMessage" aria-live="polite"></div>

                <div class="input-row">
                    <label for="student">Student name</label>
                    <input type="text" id="student" placeholder="Type a name here">
                    <button type="button" onclick="addStudent()">Add Student</button>
                </div>
            </div>

            <div class="list-panel">
                <div class="list-header">
                    <span>Live Array Output</span>
                    <span class="status-dot"></span>
                </div>
                <table id="show" aria-label="Added students"></table>
            </div>

        </section>
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
            Launch demo modal
        </button>

        <!-- Modal -->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">Edit Item</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <input type="text" class="w-100 " id="editInput" placeholder="Type a name here">
                        <p id="editError"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="savedEdit()">Save changes</button>
                    </div>
                </div>
            </div>
        </div>


    </main>






    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
